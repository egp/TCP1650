sentence=Arduino library for TM1650 4-digit LED modules with decimal, hex, dot, and raw button support.
paragraph=TCP1650 provides a small Arduino API for TM1650-based display modules using TCP1819 for I2C transport. It supports decimal display, hexadecimal display, one decimal point at a time, raw button reads through temporary key-read mode, cached off-state updates, and repaint on display enable.
