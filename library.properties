sentence=Arduino library for TM1650 4-digit LED modules with decimal, hex, dot, and raw button support.
paragraph=TCP1650 provides a small mid-level Arduino API for TM1650-based display modules using only Arduino core and Wire. It supports decimal display, hexadecimal display, one decimal point at a time, raw button reads through temporary key mode, cached off-state updates, and repaint on display enable.
